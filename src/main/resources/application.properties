spring.application.name=food-donation-system

server.port=8080

# ===============================
# DATABASE (SAFE UNIVERSAL FIX)
# ===============================

# IMPORTANT: fallback prevents crash if env not found
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/fooddb}

spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Piyush@123}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

